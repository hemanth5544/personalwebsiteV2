<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" role="img" aria-label="Concurrent reads see a free seat; both write; duplicate bookings possible">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#e4e4e7"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#71717a"/>
    </marker>
  </defs>
  <rect width="720" height="280" fill="url(#bg)" rx="12"/>
  <text x="360" y="36" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" fill="#3f3f46" font-weight="600">Concurrent booking without row lock</text>
  <rect x="40" y="60" width="150" height="56" rx="8" fill="#ffffff" stroke="#a1a1aa" filter="url(#sh)"/>
  <text x="115" y="95" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#52525b">User A reads</text>
  <text x="115" y="110" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#71717a">seat free</text>
  <rect x="260" y="60" width="150" height="56" rx="8" fill="#ffffff" stroke="#a1a1aa" filter="url(#sh)"/>
  <text x="335" y="95" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#52525b">User B reads</text>
  <text x="335" y="110" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#71717a">seat free</text>
  <path d="M 115 130 L 115 150 L 200 150 L 200 168" stroke="#71717a" fill="none" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 335 130 L 335 150 L 200 150" stroke="#71717a" fill="none" stroke-width="1.5"/>
  <rect x="125" y="170" width="150" height="52" rx="8" fill="#fef2f2" stroke="#f87171"/>
  <text x="200" y="200" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="12" fill="#b91c1c" font-weight="600">Both book same seat</text>
  <text x="360" y="248" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="13" fill="#52525b">Read–write gap ? duplicates or inconsistent state</text>
</svg>
